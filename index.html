<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Grupo Navarro Comunicaciones S.A. - Emisora líder en Chiriquí, Panamá." />
  <meta name="keywords" content="navarro, comunicaciones, noticias, emisora, radio, Chiriquí, Panamá" />
  <meta name="author" content="Grupo Navarro Comunicaciones S.A." />
  <meta property="og:title" content="Grupo Navarro Comunicaciones S.A. | Emisora & Espacio Informativo" />
  <meta property="og:description" content="Tu fuente principal de noticias e información en Chiriquí, Panamá." />
  <meta property="og:type" content="website" />
  <title>Grupo Navarro Comunicaciones S.A. | Emisora & Espacio Informativo</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='15' fill='%230d1b4b'/><text x='50%' y='58%' dominant-baseline='middle' text-anchor='middle' font-size='45' fill='%2300c3ff'>GN</text></svg>" type="image/svg+xml" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root{
      --navy-deep:#0a0f2e;
      --navy-mid:#0d1b4b;
      --navy-light:#1a2a6c;
      --navy-card:#111d4a;
      --cyan:#00c3ff;
      --cyan-bright:#00e5ff;
      --cyan-glow:rgba(0,195,255,0.35);
      --cyan-soft:rgba(0,229,255,0.12);
      --white:#f0f8ff;
      --gray:#8ba3c7;
      --success:#00e676;
      --warning:#ffb300;
      --danger:#ff1744;
      --font-head:'Orbitron',sans-serif;
      --font-body:'Exo 2',sans-serif;
      --font-ui:'Rajdhani',sans-serif;
      --transition:.35s ease;
      --radius:12px;
      --radius-lg:20px;
    }

    html{scroll-behavior:smooth;font-size:16px}
    body{
      background:var(--navy-deep);
      color:var(--white);
      font-family:var(--font-body);
      overflow-x:hidden;
    }

    ::selection{background:var(--cyan);color:var(--navy-deep)}
    a{text-decoration:none;color:inherit}
    img{max-width:100%;display:block}
    ul{list-style:none}
    button{font-family:inherit}

    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:var(--navy-deep)}
    ::-webkit-scrollbar-thumb{background:var(--cyan);border-radius:3px}

    #particles-canvas{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
      z-index:0;
      opacity:.45;
    }

    #db-status{
      position:fixed;
      bottom:1.2rem;
      left:1.2rem;
      z-index:9999;
      display:flex;
      align-items:center;
      gap:.55rem;
      background:rgba(10,15,46,.95);
      border:1px solid rgba(0,195,255,.25);
      border-radius:20px;
      padding:.38rem .95rem;
      font-size:.72rem;
      letter-spacing:1px;
      color:var(--gray);
      font-family:var(--font-head);
      box-shadow:0 4px 16px rgba(0,0,0,.4);
    }
    #db-status .db-dot{
      width:8px;height:8px;border-radius:50%;
      background:var(--warning);
      box-shadow:0 0 8px var(--warning);
    }
    #db-status.connected{border-color:rgba(0,230,118,.28);color:var(--success)}
    #db-status.connected .db-dot{background:var(--success);box-shadow:0 0 8px var(--success)}
    #db-status.error{border-color:rgba(255,23,68,.3);color:var(--danger)}
    #db-status.error .db-dot{background:var(--danger);box-shadow:0 0 8px var(--danger)}

    .navbar{
      position:fixed;
      top:0;left:0;right:0;
      z-index:1000;
      height:72px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 3rem;
      background:rgba(10,15,46,.92);
      backdrop-filter:blur(18px);
      border-bottom:1px solid rgba(0,195,255,.18);
      transition:var(--transition);
    }
    .navbar.scrolled{
      background:rgba(10,15,46,.98);
      box-shadow:0 4px 30px rgba(0,195,255,.15);
    }

    .nav-logo{
      display:flex;
      align-items:center;
      gap:.75rem;
      font-family:var(--font-head);
      font-size:1rem;
      color:var(--cyan-bright);
      text-shadow:0 0 15px var(--cyan);
      letter-spacing:1.3px;
      font-weight:700;
    }
    .nav-logo .logo-icon{
      width:42px;height:42px;border-radius:10px;
      background:linear-gradient(135deg,var(--navy-light),var(--navy-deep));
      border:2px solid var(--cyan);
      display:flex;align-items:center;justify-content:center;
      font-size:1.2rem;color:var(--cyan);
      box-shadow:0 0 14px var(--cyan-glow);
      flex-shrink:0;
    }

    .nav-links{display:flex;align-items:center;gap:1.7rem}
    .nav-links a{
      font-family:var(--font-ui);
      font-size:1rem;
      font-weight:600;
      color:var(--white);
      letter-spacing:1.5px;
      text-transform:uppercase;
      padding:.35rem 0;
      position:relative;
      transition:var(--transition);
    }
    .nav-links a::after{
      content:'';
      position:absolute;
      left:0;right:0;bottom:-2px;
      height:2px;
      background:var(--cyan);
      transform:scaleX(0);
      transform-origin:left;
      transition:transform .3s ease;
    }
    .nav-links a:hover,
    .nav-links a.active{
      color:var(--cyan);
      text-shadow:0 0 8px var(--cyan-glow);
    }
    .nav-links a:hover::after,
    .nav-links a.active::after{
      transform:scaleX(1);
    }

    .nav-btn,
    .btn-primary,
    .btn-outline{
      cursor:pointer;
      transition:var(--transition);
    }

    .nav-btn{
      background:transparent;
      border:2px solid var(--cyan);
      color:var(--cyan);
      font-family:var(--font-head);
      font-size:.75rem;
      letter-spacing:2px;
      padding:.5rem 1.2rem;
      border-radius:6px;
      text-transform:uppercase;
      box-shadow:0 0 10px rgba(0,195,255,.2);
    }
    .nav-btn:hover{
      background:var(--cyan);
      color:var(--navy-deep);
      box-shadow:0 0 20px var(--cyan);
    }

    .hamburger{
      display:none;
      flex-direction:column;
      gap:5px;
      cursor:pointer;
      background:none;
      border:none;
      padding:.3rem;
    }
    .hamburger span{
      width:26px;height:2px;background:var(--cyan);border-radius:2px;
      transition:var(--transition);
      display:block;
    }
    .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .hamburger.open span:nth-child(2){opacity:0}
    .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

    .mobile-nav{
      position:fixed;
      top:72px;left:0;right:0;
      background:rgba(10,15,46,.98);
      border-bottom:1px solid rgba(0,195,255,.18);
      padding:1.2rem 1.5rem;
      z-index:990;
      transform:translateY(-120%);
      opacity:0;
      pointer-events:none;
      transition:transform .35s ease, opacity .35s ease;
    }
    .mobile-nav.open{
      transform:translateY(0);
      opacity:1;
      pointer-events:auto;
    }
    .mobile-nav a{
      display:block;
      padding:.85rem 0;
      border-bottom:1px solid rgba(0,195,255,.08);
      font-family:var(--font-ui);
      font-size:1.05rem;
      font-weight:600;
      letter-spacing:2px;
      text-transform:uppercase;
    }
    .mobile-nav a.active,
    .mobile-nav a:hover{color:var(--cyan)}

    .page{
      display:none;
      min-height:100vh;
      padding-top:72px;
      position:relative;
      z-index:1;
    }
    .page.active{display:block}

    .section{padding:5rem 3rem}
    .container{max-width:1200px;margin:0 auto}

    .section-tag{
      display:inline-block;
      font-family:var(--font-head);
      font-size:.7rem;
      letter-spacing:4px;
      text-transform:uppercase;
      color:var(--cyan);
      border:1px solid var(--cyan);
      padding:.3rem .9rem;
      border-radius:20px;
      margin-bottom:1.2rem;
      box-shadow:0 0 12px rgba(0,195,255,.18);
    }
    .section-title{
      font-family:var(--font-head);
      font-size:clamp(1.9rem,3.5vw,2.8rem);
      font-weight:700;
      line-height:1.2;
      margin-bottom:1rem;
    }
    .section-title span{
      color:var(--cyan);
      text-shadow:0 0 20px var(--cyan-glow);
    }
    .section-sub{
      color:var(--gray);
      font-size:1.05rem;
      max-width:680px;
      line-height:1.75;
      margin-bottom:3rem;
    }
    .divider{
      width:60px;height:3px;border-radius:2px;
      background:linear-gradient(90deg,var(--cyan),transparent);
      margin:1rem 0 2.3rem;
    }

    .btn-primary{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:.6rem;
      background:linear-gradient(135deg,var(--cyan),#006fa0);
      color:var(--navy-deep);
      font-family:var(--font-head);
      font-size:.82rem;
      font-weight:700;
      letter-spacing:2px;
      padding:.9rem 1.8rem;
      border-radius:8px;
      border:none;
      text-transform:uppercase;
      box-shadow:0 4px 20px rgba(0,195,255,.35);
    }
    .btn-primary:hover{
      transform:translateY(-3px);
      box-shadow:0 8px 30px rgba(0,195,255,.55);
    }

    .btn-outline{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:.6rem;
      background:transparent;
      color:var(--cyan);
      border:2px solid var(--cyan);
      font-family:var(--font-head);
      font-size:.82rem;
      font-weight:600;
      letter-spacing:2px;
      padding:.9rem 1.8rem;
      border-radius:8px;
      text-transform:uppercase;
      box-shadow:0 0 12px rgba(0,195,255,.12);
    }
    .btn-outline:hover{
      background:var(--cyan);
      color:var(--navy-deep);
      transform:translateY(-3px);
      box-shadow:0 4px 25px rgba(0,195,255,.5);
    }

    .card{
      background:var(--navy-card);
      border:1px solid rgba(0,195,255,.15);
      border-radius:var(--radius);
      padding:2rem;
      transition:var(--transition);
      position:relative;
      overflow:hidden;
    }
    .card:hover{
      border-color:rgba(0,195,255,.45);
      transform:translateY(-5px);
      box-shadow:0 16px 40px rgba(0,195,255,.12);
    }

    .fade-up{
      opacity:0;
      transform:translateY(35px);
      transition:opacity .7s ease, transform .7s ease;
    }
    .fade-up.visible{
      opacity:1;
      transform:translateY(0);
    }

    /* HERO */
    .hero{
      position:relative;
      min-height:100vh;
      display:flex;
      align-items:center;
      overflow:hidden;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%,rgba(26,42,108,.6),transparent),
        var(--navy-deep);
    }
    .hero-grid-bg{
      position:absolute;inset:0;
      background-image:
        linear-gradient(rgba(0,195,255,.04) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,195,255,.04) 1px,transparent 1px);
      background-size:60px 60px;
      mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black,transparent);
    }
    .hero-content{
      position:relative;
      z-index:2;
      max-width:1200px;
      width:100%;
      margin:0 auto;
      padding:0 3rem;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:4rem;
      align-items:center;
    }
    .hero-badge{
      display:inline-flex;
      align-items:center;
      gap:.6rem;
      background:rgba(0,195,255,.1);
      border:1px solid rgba(0,195,255,.3);
      padding:.45rem 1rem;
      border-radius:20px;
      font-size:.8rem;
      letter-spacing:2px;
      color:var(--cyan);
      text-transform:uppercase;
      margin-bottom:1.4rem;
      animation:pulse-badge 2s ease infinite;
    }
    @keyframes pulse-badge{
      0%,100%{box-shadow:0 0 0 0 rgba(0,195,255,.35)}
      50%{box-shadow:0 0 0 8px rgba(0,195,255,0)}
    }
    .hero-badge .dot{
      width:8px;height:8px;border-radius:50%;
      background:var(--cyan);
      animation:blink 1.2s ease infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .hero-title{
      font-family:var(--font-head);
      font-size:clamp(2.2rem,5vw,4rem);
      font-weight:900;
      line-height:1.08;
      margin-bottom:1.4rem;
    }
    .hero-title .glitch{
      color:var(--cyan);
      text-shadow:0 0 30px var(--cyan-glow),0 0 60px rgba(0,195,255,.3);
    }
    .hero-desc{
      color:var(--gray);
      font-size:1.08rem;
      line-height:1.8;
      max-width:560px;
      margin-bottom:2rem;
    }
    .hero-cta{
      display:flex;
      gap:1rem;
      flex-wrap:wrap;
    }
    .hero-visual{
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }
    .hero-orb{
      width:360px;height:360px;border-radius:50%;
      background:radial-gradient(circle at 35% 35%,var(--navy-light),var(--navy-deep));
      border:2px solid rgba(0,195,255,.25);
      position:relative;
      box-shadow:0 0 80px rgba(0,195,255,.18),inset 0 0 80px rgba(0,195,255,.05);
      display:flex;align-items:center;justify-content:center;
      animation:orb-pulse 4s ease infinite;
    }
    @keyframes orb-pulse{
      0%,100%{box-shadow:0 0 80px rgba(0,195,255,.18),inset 0 0 80px rgba(0,195,255,.05)}
      50%{box-shadow:0 0 120px rgba(0,195,255,.3),inset 0 0 100px rgba(0,195,255,.08)}
    }
    .hero-orb::before,.hero-orb::after{
      content:'';
      position:absolute;
      border-radius:50%;
      border:1px solid rgba(0,195,255,.15);
      animation:ring-spin 8s linear infinite;
    }
    .hero-orb::before{width:120%;height:120%}
    .hero-orb::after{
      width:145%;height:145%;
      animation-duration:12s;
      animation-direction:reverse;
      border-color:rgba(0,195,255,.08);
    }
    @keyframes ring-spin{to{transform:rotate(360deg)}}
    .hero-logo-center{
      font-family:var(--font-head);
      font-size:2rem;
      font-weight:900;
      color:var(--cyan);
      text-align:center;
      line-height:1.2;
      text-shadow:0 0 30px var(--cyan-glow);
      z-index:1;
    }
    .hero-logo-center small{
      display:block;
      font-size:.65rem;
      letter-spacing:6px;
      color:var(--gray);
      margin-top:.35rem;
    }
    .orbit-tag{
      position:absolute;
      background:rgba(13,27,75,.92);
      border:1px solid var(--cyan);
      padding:.35rem .8rem;
      border-radius:20px;
      font-size:.72rem;
      letter-spacing:1px;
      color:var(--cyan);
      white-space:nowrap;
      box-shadow:0 0 10px rgba(0,195,255,.25);
    }
    .orbit-tag:nth-child(2){top:8%;left:50%;transform:translateX(-50%)}
    .orbit-tag:nth-child(3){top:50%;right:-10%;transform:translateY(-50%)}
    .orbit-tag:nth-child(4){bottom:10%;left:50%;transform:translateX(-50%)}
    .orbit-tag:nth-child(5){top:50%;left:-12%;transform:translateY(-50%)}

    .stats-section{
      background:var(--navy-mid);
      border-top:1px solid rgba(0,195,255,.12);
      border-bottom:1px solid rgba(0,195,255,.12);
      padding:3.5rem 3rem;
    }
    .stats-grid{
      max-width:1200px;
      margin:0 auto;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:2rem;
    }
    .stat-item{text-align:center}
    .stat-num{
      font-family:var(--font-head);
      font-size:clamp(2rem,4vw,3rem);
      font-weight:800;
      color:var(--cyan);
      text-shadow:0 0 20px var(--cyan-glow);
      display:block;
      line-height:1;
      margin-bottom:.35rem;
    }
    .stat-label{
      font-size:.85rem;
      letter-spacing:2px;
      text-transform:uppercase;
      color:var(--gray);
    }

    .mv-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:2rem;
      margin-top:2rem;
    }
    .mv-card{
      background:var(--navy-card);
      border:1px solid rgba(0,195,255,.18);
      border-radius:var(--radius-lg);
      padding:2.4rem;
      position:relative;
      overflow:hidden;
      transition:var(--transition);
    }
    .mv-card:hover{
      border-color:rgba(0,195,255,.4);
      transform:translateY(-4px);
    }
    .mv-card::after{
      content:'';
      position:absolute;
      top:-60px;right:-60px;
      width:200px;height:200px;border-radius:50%;
      background:radial-gradient(circle,rgba(0,195,255,.08),transparent 70%);
    }
    .mv-icon{
      font-size:2.5rem;
      color:var(--cyan);
      margin-bottom:1rem;
      text-shadow:0 0 20px var(--cyan-glow);
    }
    .mv-card h3{
      font-family:var(--font-head);
      font-size:1.08rem;
      letter-spacing:3px;
      color:var(--cyan);
      margin-bottom:1rem;
    }
    .mv-card p{
      color:var(--gray);
      line-height:1.75;
      font-size:.95rem;
    }

    .news-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:1.5rem;
      margin-top:2rem;
    }
    .news-card{
      background:var(--navy-card);
      border:1px solid rgba(0,195,255,.12);
      border-radius:var(--radius);
      overflow:hidden;
      transition:var(--transition);
    }
    .news-card:hover{
      border-color:rgba(0,195,255,.4);
      transform:translateY(-6px);
      box-shadow:0 16px 40px rgba(0,195,255,.15);
    }
    .news-thumb{
      height:180px;
      overflow:hidden;
      background:linear-gradient(135deg,var(--navy-light),var(--navy-mid));
      display:flex;align-items:center;justify-content:center;
      position:relative;
    }
    .news-thumb-icon{
      font-size:3.5rem;
      opacity:.25;
    }
    .news-thumb-badge{
      position:absolute;
      top:12px;left:12px;
      background:var(--cyan);
      color:var(--navy-deep);
      font-size:.7rem;
      font-weight:700;
      letter-spacing:1px;
      padding:.2rem .7rem;
      border-radius:4px;
      text-transform:uppercase;
    }
    .news-body{padding:1.35rem}
    .news-cat{
      font-size:.72rem;
      letter-spacing:2px;
      color:var(--cyan);
      text-transform:uppercase;
      margin-bottom:.5rem;
    }
    .news-title-card{
      font-family:var(--font-head);
      font-size:.95rem;
      font-weight:600;
      line-height:1.4;
      margin-bottom:.7rem;
    }
    .news-meta{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:.8rem;
      font-size:.8rem;
      color:var(--gray);
      margin-top:1rem;
    }
    .news-meta i{color:var(--cyan);font-size:.75rem}

    .clients-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:1.5rem;
      margin-top:2rem;
    }
    .client-card{
      background:var(--navy-card);
      border:1px solid rgba(0,195,255,.12);
      border-radius:var(--radius);
      padding:2rem;
      text-align:center;
      transition:var(--transition);
    }
    .client-card:hover{
      border-color:rgba(0,195,255,.45);
      transform:translateY(-6px);
      box-shadow:0 14px 40px rgba(0,195,255,.15);
    }
    .client-avatar{
      width:80px;height:80px;border-radius:50%;
      margin:0 auto 1.1rem;
      background:linear-gradient(135deg,var(--navy-light),var(--navy-mid));
      border:2px solid rgba(0,195,255,.3);
      display:flex;align-items:center;justify-content:center;
      font-size:2rem;color:var(--cyan);
    }
    .client-name{
      font-family:var(--font-head);
      font-size:.9rem;
      font-weight:600;
      margin-bottom:.3rem;
    }
    .client-type{
      font-size:.8rem;
      color:var(--cyan);
      letter-spacing:1px;
      margin-bottom:.8rem;
    }
    .client-desc{
      font-size:.85rem;
      color:var(--gray);
      line-height:1.6;
    }
    .client-badge{
      display:inline-block;
      margin-top:.8rem;
      background:rgba(0,195,255,.1);
      border:1px solid rgba(0,195,255,.25);
      color:var(--cyan);
      font-size:.72rem;
      letter-spacing:1px;
      padding:.25rem .7rem;
      border-radius:20px;
    }

    .testimonial-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
